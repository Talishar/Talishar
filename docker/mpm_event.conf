<IfModule mpm_event_module>
    StartServers             3
    MinSpareThreads         75
    MaxSpareThreads        250
    ThreadLimit             64
    ThreadsPerChild         25
    # Each thread can handle multiple idle connections (SSE, keep-alive) via async I/O.
    # 400 threads handles ~1600 concurrent connections (AsyncRequestWorkerFactor default=2).
    MaxRequestWorkers      400
    MaxConnectionsPerChild   0
</IfModule>
