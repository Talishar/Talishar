[www]
; Override the default TCP listen (set by zz-docker.conf) with a unix socket.
; The unix socket avoids TCP overhead for the Apache->FPM hop on the same host.
listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Pass all Docker env vars through to PHP (MYSQL_*, REDIS_HOST, DOMAIN, etc.)
; Without this, FPM starts with a blank environment and DB/Redis connections fail.
clear_env = no

pm = dynamic
pm.max_children = 150
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
; Recycle workers periodically to bound memory growth from large game states
pm.max_requests = 500
