; If you make changes to this file you need to restart the container
; Mounted as conf.d/zz-talishar-apcu-tuning.ini so it loads after the
; auto-generated docker-php-ext-apcu.ini (which contains "extension=apcu.so").
;
; APCu backs the 1-second gamestate response cache (Libraries/CacheLibraries.php)
; plus typing indicators. The 32M default fills up once a few dozen games are
; active (each cached gamestate is ~50-200KB), causing constant eviction and
; defeating the cache. 128M gives comfortable headroom.
apc.shm_size=128M
