# If you make changes to this file you need to restart the container
#
# Talishar performance tuning for Apache.
# Mounted into /etc/apache2/conf-enabled/ via docker-compose.yml — conf-enabled
# loads after mods-enabled, so these directives extend/override the defaults.

# --- Compress JSON API responses ---
# Debian's default deflate.conf compresses html/css/js/xml but NOT
# application/json, so game state polls (GetNextTurn.php) and every API
# response were shipped uncompressed. Game state JSON compresses ~5-10x.
# text/event-stream (GetUpdateSSE.php) is deliberately NOT listed: compressing
# SSE can buffer events and break real-time delivery.
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE application/json
</IfModule>

# --- Concurrent connection headroom for SSE ---
# GetUpdateSSE.php holds one Apache (prefork) worker per connected client for
# the whole game. The Debian default MaxRequestWorkers of 150 is therefore a
# hard cap on concurrent players+spectators; once reached, every new request
# (including game actions) queues and the site feels frozen.
# 250 workers with mod_php: opcache/APCu memory is shared, per-child unique
# RSS is typically 20-40MB, so budget roughly 5-10GB RAM at full saturation.
# Raise further only if the host has the memory for it.
<IfModule mpm_prefork_module>
    ServerLimit             250
    MaxRequestWorkers       250
    # Recycle children periodically so any per-process memory growth in
    # long-lived SSE workers gets reclaimed. 0 (never) is the Debian default.
    MaxConnectionsPerChild  10000
</IfModule>
