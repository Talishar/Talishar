<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # flushpackets=on makes Apache forward each FastCGI data record to the client
    # immediately rather than buffering — required for SSE (GetUpdateSSE.php).
    # 1800s: SSE connections are silent during player think time (up to minutes),
    # so ProxyTimeout must exceed the longest plausible move time. Apache's default
    # Timeout is 300s, which would also drop SSE — this overrides it to 30 min.
    # Note: adding SSE heartbeat comments in GetUpdateSSE.php would let this be lower.
    ProxyTimeout 1800

    <Proxy "unix:/run/php/php-fpm.sock|fcgi://localhost/">
        ProxySet flushpackets=on
    </Proxy>

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
