; If you make changes to this file you need to restart the container
[opcache]
zend_extension=opcache.so
opcache.enable=1

; PRODUCTION: set validate_timestamps=0 and clear cache after each deploy (opcache_reset() or container restart)
; DEVELOPMENT: keep at 1 so file changes are detected automatically
opcache.validate_timestamps=1
; Check for file changes every 2s rather than on every single request (revalidate_freq=0 stat()s 100+ files per request)
; This setting is ignored when validate_timestamps=0
opcache.revalidate_freq=2

opcache.max_accelerated_files=10000
; 256MB: extra headroom for all card dictionary files, game logic, class files, and JIT-compiled code
opcache.memory_consumption=256
opcache.max_wasted_percentage=10
; 32MB for interned strings — card names and game constants benefit from the larger buffer
opcache.interned_strings_buffer=32
opcache.fast_shutdown=1

; JIT compilation (PHP 8.x) — traces and natively compiles hot loops at runtime
; Gives meaningful speedups for CPU-bound game logic (combat evaluation, card lookups, turn processing)
; JIT is automatically disabled when Xdebug runs in debug mode, so dev debugging is unaffected
opcache.jit=tracing
opcache.jit_buffer_size=64M
